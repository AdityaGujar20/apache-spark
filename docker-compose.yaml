services:

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: spark-master
    hostname: spark-master

    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    environment:
      - SPARK_MODE=master

    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
      - ./warehouse:/opt/spark/warehouse

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: spark-worker-1
    hostname: spark-worker-1

    depends_on:
      - spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2

    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
      - ./warehouse:/opt/spark/warehouse

  spark-worker-2:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: spark-worker-2
    hostname: spark-worker-2

    depends_on:
      - spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2

    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
      - ./warehouse:/opt/spark/warehouse

  spark-worker-3:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: spark-worker-3
    hostname: spark-worker-3

    depends_on:
      - spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2

    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
      - ./warehouse:/opt/spark/warehouse

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: spark-jupyter
    hostname: spark-jupyter

    ports:
      - "8888:8888"

    depends_on:
      - spark-master

    command: >
      bash -c "
      export HOME=/tmp &&
      pip install notebook &&
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      "

    environment:
      - SPARK_MASTER=spark://spark-master:7077

    volumes:
      - ./notebooks:/opt/spark/notebooks
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
      - ./warehouse:/opt/spark/warehouse

  postgres:
    image: postgres:17

    container_name: postgres-db

    environment:
      POSTGRES_DB: spark_db
      POSTGRES_USER: spark_user
      POSTGRES_PASSWORD: spark_pass

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: